apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: buildbrain-prod
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'buildbrain-prod'
        environment: 'production'

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - '/etc/prometheus/rules/*.yml'

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - buildbrain-prod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      - job_name: 'kubernetes-services'
        kubernetes_sd_configs:
          - role: service
            namespaces:
              names:
                - buildbrain-prod
        metrics_path: /probe
        params:
          module: [http_2xx]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_probe]
            action: keep
            regex: true
          - source_labels: [__address__]
            target_label: __param_target
          - target_label: __address__
            replacement: blackbox-exporter:9115
          - source_labels: [__param_target]
            target_label: instance
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: kubernetes_name

      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter:9121']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: buildbrain-prod
data:
  buildbrain-rules.yml: |
    groups:
      - name: buildbrain
        interval: 30s
        rules:
          - alert: HighErrorRate
            expr: rate(http_requests_total{job="api-gateway",status=~"5.."}[5m]) > 0.05
            for: 5m
            labels:
              severity: critical
              service: api-gateway
            annotations:
              summary: "High error rate detected"
              description: "{{ $labels.instance }} has {{ $value | humanizePercentage }} error rate"

          - alert: HighLatency
            expr: histogram_quantile(0.95, http_request_duration_seconds_bucket{job="api-gateway"}) > 1
            for: 5m
            labels:
              severity: warning
              service: api-gateway
            annotations:
              summary: "High request latency detected"
              description: "{{ $labels.instance }} p95 latency is {{ $value }}s"

          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod crash looping"
              description: "Pod {{ $labels.pod_name }} in namespace {{ $labels.namespace }} is crash looping"

          - alert: PersistentVolumeCritical
            expr: kubelet_volume_stats_available_bytes / 1024 / 1024 / 1024 < 5
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Low disk space on persistent volume"
              description: "{{ $labels.persistentvolumeclaim }} has only {{ $value | humanize }}GB available"

          - alert: DatabaseConnectionPoolExhausted
            expr: pg_stat_activity_count / 100 > 0.8
            for: 5m
            labels:
              severity: warning
              service: postgres
            annotations:
              summary: "Database connection pool nearly exhausted"
              description: "{{ $labels.instance }} is using {{ $value | humanizePercentage }} of connections"
