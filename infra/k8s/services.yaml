apiVersion: v1
kind: ServiceAccount
metadata:
  name: builddbrain-sa
  namespace: buildbrain-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: buildbrain-role
  namespace: buildbrain-prod
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: buildbrain-rolebinding
  namespace: buildbrain-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: buildbrain-role
subjects:
  - kind: ServiceAccount
    name: builddbrain-sa
    namespace: buildbrain-prod
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: buildbrain-pdb
  namespace: buildbrain-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: buildbrain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: buildbrain-prod
  labels:
    app: user-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: builddbrain-sa
      containers:
        - name: user-service
          image: buildbrain/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: buildbrain-prod
  labels:
    app: user-service
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: buildbrain-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
