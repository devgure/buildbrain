version: '3.8'

services:
  # ============ DATABASES ============
  
  postgres:
    image: postgres:15-alpine
    container_name: buildbrain-postgres
    environment:
      POSTGRES_USER: buildbrain
      POSTGRES_PASSWORD: buildbrain_dev_password
      POSTGRES_DB: buildbrain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildbrain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildbrain-network

  mongodb:
    image: mongo:7.0
    container_name: buildbrain-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: buildbrain
      MONGO_INITDB_ROOT_PASSWORD: buildbrain_dev_password
      MONGO_INITDB_DATABASE: buildbrain_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildbrain-network

  redis:
    image: redis:7-alpine
    container_name: buildbrain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildbrain-network

  # ============ AI & VECTOR DB ============
  
  qdrant:
    image: qdrant/qdrant:latest
    container_name: buildbrain-qdrant
    environment:
      QDRANT_API_KEY: buildbrain_qdrant_key
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildbrain-network

  # ============ STORAGE ============
  
  minio:
    image: minio/minio:latest
    container_name: buildbrain-minio
    environment:
      MINIO_ROOT_USER: buildbrain
      MINIO_ROOT_PASSWORD: buildbrain_dev_password
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web UI
    volumes:
      - minio_data:/minio/data
    command: server /minio/data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - buildbrain-network

  # ============ MESSAGE QUEUE ============
  
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: buildbrain-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: buildbrain
      RABBITMQ_DEFAULT_PASS: buildbrain_dev_password
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildbrain-network

  # ============ MONITORING (Optional) ============
  
  prometheus:
    image: prom/prometheus:latest
    container_name: buildbrain-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - buildbrain-network

  grafana:
    image: grafana/grafana:latest
    container_name: buildbrain-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - buildbrain-network

  # ============ SEARCH (Optional) ============
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: buildbrain-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - buildbrain-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  qdrant_data:
  minio_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  buildbrain-network:
    driver: bridge
