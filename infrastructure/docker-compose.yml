version: '3.8'

services:
  # ============= DATABASES =============
  postgres:
    image: postgres:15-alpine
    container_name: buildnexus-postgres
    environment:
      POSTGRES_USER: buildnexus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB: buildnexus
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildnexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildnexus-network

  redis:
    image: redis:7-alpine
    container_name: buildnexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildnexus-network

  mongodb:
    image: mongo:6-alpine
    container_name: buildnexus-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: buildnexus
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-devpassword}
      MONGO_INITDB_DATABASE: buildnexus
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--authenticationDatabase", "admin", "-u", "buildnexus", "-p", "devpassword", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildnexus-network

  # ============= VECTOR DATABASE =============
  qdrant:
    image: qdrant/qdrant:latest
    container_name: buildnexus-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-dev-key}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildnexus-network

  # ============= BACKEND SERVICES =============
  api-gateway:
    image: kong:3.3-alpine
    container_name: buildnexus-api-gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: buildnexus
      KONG_PG_PASSWORD: ${DB_PASSWORD:-devpassword}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"  # Proxy
      - "8443:8443"  # Proxy SSL
      - "8001:8001"  # Admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - buildnexus-network

  # ============= BACKEND API (NestJS) =============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buildnexus-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://buildnexus:${DB_PASSWORD:-devpassword}@postgres:5432/buildnexus
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://buildnexus:${MONGO_PASSWORD:-devpassword}@mongodb:27017/buildnexus?authSource=admin
      QDRANT_URL: http://qdrant:6333
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_xxx}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_xxx}
      UNIT_API_KEY: ${UNIT_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-buildnexus-dev}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    networks:
      - buildnexus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============= AI SERVICE (FastAPI) =============
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: buildnexus-ai-service
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: postgresql://buildnexus:${DB_PASSWORD:-devpassword}@postgres:5432/buildnexus
      MONGODB_URI: mongodb://buildnexus:${MONGO_PASSWORD:-devpassword}@mongodb:27017/buildnexus?authSource=admin
      QDRANT_URL: http://qdrant:6333
      PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./ai-service:/app
      - /app/__pycache__
    networks:
      - buildnexus-network

  # ============= FRONTEND (Next.js) =============
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: buildnexus-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_xxx}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/web/src:/app/src
      - /app/node_modules
    networks:
      - buildnexus-network

  # ============= MONITORING & OBSERVABILITY =============
  prometheus:
    image: prom/prometheus:latest
    container_name: buildnexus-prometheus
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - buildnexus-network

  grafana:
    image: grafana/grafana:latest
    container_name: buildnexus-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3010:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - buildnexus-network

  # ============= MESSAGE QUEUE =============
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: buildnexus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-buildnexus}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-devpassword}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - buildnexus-network

  # ============= S3 STORAGE (MinIO) =============
  minio:
    image: minio/minio:latest
    container_name: buildnexus-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - buildnexus-network

  # ============= LOGGING STACK =============
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: buildnexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - buildnexus-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.0.0
    container_name: buildnexus-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - buildnexus-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  buildnexus-network:
    driver: bridge
