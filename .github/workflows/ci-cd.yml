name: 'Build, Test, Deploy'

on:
  push:
    branches:
      - main
      - develop
      - staging
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v3

      - name: 'Setup Node.js'
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Lint code'
        run: npm run lint

      - name: 'Run unit tests'
        run: npm run test:unit

      - name: 'Run integration tests'
        run: npm run test:integration

      - name: 'Upload coverage'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v3

      - name: 'Run Snyk scan'
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  build-and-push:
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v3

      - name: 'Setup Docker Buildx'
        uses: docker/setup-buildx-action@v2

      - name: 'Log in to Container Registry'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Extract metadata'
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Build backend services
      - name: 'Build and push auth-service'
        uses: docker/build-push-action@v4
        with:
          context: ./services/auth-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-service:${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-service:buildcache,mode=max

      - name: 'Build and push payment-service'
        uses: docker/build-push-action@v4
        with:
          context: ./services/payment-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/payment-service:${{ steps.meta.outputs.tags }}

      - name: 'Build and push project-service'
        uses: docker/build-push-action@v4
        with:
          context: ./services/project-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/project-service:${{ steps.meta.outputs.tags }}

      - name: 'Build and push marketplace-service'
        uses: docker/build-push-action@v4
        with:
          context: ./services/marketplace-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/marketplace-service:${{ steps.meta.outputs.tags }}

      - name: 'Build and push ai-service'
        uses: docker/build-push-action@v4
        with:
          context: ./services/ai-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai-service:${{ steps.meta.outputs.tags }}

      # Build frontend
      - name: 'Build and push frontend'
        uses: docker/build-push-action@v4
        with:
          context: ./client/web-desktop
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.buildbrain.io
            NEXT_PUBLIC_ENV=production

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v3

      - name: 'Deploy to EKS (staging)'
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          AWS_REGION: us-east-1
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          
          kubectl set image deployment/auth-service \
            auth-service=ghcr.io/${{ env.IMAGE_NAME }}/auth-service:latest \
            -n buildbrain-staging
          
          kubectl set image deployment/payment-service \
            payment-service=ghcr.io/${{ env.IMAGE_NAME }}/payment-service:latest \
            -n buildbrain-staging
          
          kubectl set image deployment/project-service \
            project-service=ghcr.io/${{ env.IMAGE_NAME }}/project-service:latest \
            -n buildbrain-staging
          
          kubectl set image deployment/marketplace-service \
            marketplace-service=ghcr.io/${{ env.IMAGE_NAME }}/marketplace-service:latest \
            -n buildbrain-staging
          
          kubectl set image deployment/ai-service \
            ai-service=ghcr.io/${{ env.IMAGE_NAME }}/ai-service:latest \
            -n buildbrain-staging
          
          kubectl set image deployment/frontend \
            frontend=ghcr.io/${{ env.IMAGE_NAME }}/frontend:latest \
            -n buildbrain-staging

      - name: 'Run smoke tests'
        env:
          API_URL: https://staging-api.buildbrain.io
        run: npm run test:smoke

      - name: 'Notify Slack'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "channel": "#deployments"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v3

      - name: 'Deploy to EKS (production)'
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_PROD }}
          AWS_REGION: us-east-1
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          
          # Rolling update with canary deployment (10% traffic initially)
          kubectl set image deployment/auth-service \
            auth-service=ghcr.io/${{ env.IMAGE_NAME }}/auth-service:latest \
            -n buildbrain-prod
          
          # Wait for rollout
          kubectl rollout status deployment/auth-service -n buildbrain-prod

      - name: 'Run E2E tests against production'
        env:
          API_URL: https://api.buildbrain.io
          E2E_TEST_USER: ${{ secrets.E2E_TEST_USER }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e

      - name: 'Check application health'
        run: |
          curl -f https://api.buildbrain.io/health || exit 1
          curl -f https://api.buildbrain.io/api/v1/health || exit 1

      - name: 'Create deployment record'
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          environment-url: https://buildbrain.io

      - name: 'Notify Slack'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Production deployment successful",
              "channel": "#deployments",
              "attachments": [
                {
                  "text": "Commit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback:
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy-production

    steps:
      - name: 'Rollback deployment'
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_PROD }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          
          kubectl rollout undo deployment/auth-service -n buildbrain-prod
          kubectl rollout undo deployment/payment-service -n buildbrain-prod
          kubectl rollout undo deployment/project-service -n buildbrain-prod

      - name: 'Notify on failure'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ Production deployment failed and rolled back",
              "channel": "#alerts"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
